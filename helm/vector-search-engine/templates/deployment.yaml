apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vector-search-engine.fullname" . }}
  labels:
    {{- include "vector-search-engine.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vector-search-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vector-search-engine.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RUST_LOG
              value: {{ .Values.env.RUST_LOG | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: models
              mountPath: /app/models
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "vector-search-engine.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: models
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vector-search-engine.fullname" . }}
  labels:
    {{- include "vector-search-engine.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vector-search-engine.selectorLabels" . | nindent 4 }}
